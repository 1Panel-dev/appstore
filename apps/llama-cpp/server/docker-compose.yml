services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:8080
    volumes:
      - ${MODEL_DIR}:/models
    command: ${START_COMMAND}
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true
