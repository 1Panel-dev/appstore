services:
  bokebox:
    image: ghcr.io/vastsa/bokebox:1.0.0
    container_name: "${CONTAINER_NAME}"
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
    volumes:
      - ./data:/app/storage
    healthcheck:
      test:
        - CMD
        - node
        - "-e"
        - "fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    labels:
      createdBy: Apps
networks:
  1panel-network:
    external: true
