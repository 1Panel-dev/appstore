version: "3"
services:
  linker:
    image: snltty/linker-musl
    container_name: ${CONTAINER_NAME}
    privileged: true
    networks:  
      - 1panel-network
    restart: always
    tty: true
    stdin_open: true
    volumes:
      - "./data/configs:/app/configs"
      - "./data/logs:/app/logs"
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - SNLTTY_LINKER_IS_1PANEL=linker

    ports:
      - "${PANEL_APP_PORT_HTTP}:1804"
      - "${PANEL_APP_PORT_SERVICE}:1802"

networks:  
  1panel-network:  
    external: true