additionalProperties:
    formFields:
        - child:
            default: ""
            envKey: PANEL_DB_HOST
            required: true
            type: service
          default: mysql
          envKey: PANEL_DB_TYPE
          label:
              en: Database Service
              ja: データベースサービス
              ms: Perkhidmatan Pangkalan Data
              pt-br: Serviço de Banco de Dados
              ru: Сервис базы данных
              ko: 데이터베이스 서비스
              zh-Hant: 資料庫服務
              zh: 数据库服务
          required: true
          type: apps
          values:
              - label: MySQL
                value: mysql
              - label: MariaDB
                value: mariadb
        - default: oneclickvirt
          envKey: PANEL_DB_NAME
          label:
              en: Database Name
              ja: データベース名
              ms: Nama Pangkalan Data
              pt-br: Nome do Banco de Dados
              ru: Имя базы данных
              ko: 데이터베이스 이름
              zh-Hant: 資料庫名稱
              zh: 数据库名
          random: true
          required: true
          rule: paramCommon
          type: text
        - default: oneclickvirt
          envKey: PANEL_DB_USER
          label:
              en: Database User
              ja: データベースユーザー
              ms: Pengguna Pangkalan Data
              pt-br: Usuário do Banco de Dados
              ru: Пользователь базы данных
              ko: 데이터베이스 사용자
              zh-Hant: 資料庫使用者
              zh: 数据库用户
          random: true
          required: true
          rule: paramCommon
          type: text
        - default: oneclickvirt
          envKey: PANEL_DB_USER_PASSWORD
          label:
              en: Database Password
              ja: データベースパスワード
              ms: Kata Laluan Pangkalan Data
              pt-br: Senha do Banco de Dados
              ru: Пароль базы данных
              ko: 데이터베이스 비밀번호
              zh-Hant: 資料庫密碼
              zh: 数据库密码
          random: true
          required: true
          rule: paramComplexity
          type: password
        - default: ""
          edit: true
          envKey: FRONTEND_URL
          label:
              en: Frontend URL (optional, e.g. https://your-domain.com)
              ja: フロントエンド URL（例：https://your-domain.com）
              ms: URL bahagian hadapan (cth. https://your-domain.com)
              pt-br: URL do frontend (ex. https://your-domain.com)
              ru: URL фронтенда (напр. https://your-domain.com)
              ko: 프론트엔드 URL（예：https://your-domain.com）
              zh-Hant: 前端存取位址（選填，如 https://your-domain.com）
              zh: 前端访问地址（选填，如 https://your-domain.com）
          required: false
          rule: paramExtUrl
          type: text
        - default: 80
          edit: true
          envKey: PANEL_APP_PORT_HTTP
          label:
              en: WebUI Port
              ja: WebUI ポート
              ms: Port WebUI
              pt-br: Porta WebUI
              ru: Порт WebUI
              ko: WebUI 포트
              zh-Hant: WebUI 埠
              zh: 网页端口
          required: true
          rule: paramPort
          type: number
