services:
  vane:
    container_name: ${CONTAINER_NAME}
    image: itzcrazykns1337/vane:v1.12.2
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:3000
    volumes:
      - ./data:/home/vane/data
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true