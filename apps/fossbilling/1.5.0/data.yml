additionalProperties:
  formFields:
    - child:
        default: ""
        envKey: PANEL_DB_HOST
        required: true
        type: service
      default: mysql
      envKey: PANEL_DB_TYPE
      label:
        en: Database Service
        es-es: Servicio de base de datos
        ja: データベースサービス
        ms: Perkhidmatan Pangkalan Data
        pt-br: Serviço de Banco de Dados
        ru: Сервис баз данных
        ko: 데이터베이스 서비스
        zh-hant: 資料庫服務
        zh: 数据库服务
        tr: Veritabanı Hizmeti
      required: true
      type: apps
      values:
        - label: MySQL
          value: mysql
        - label: MariaDB
          value: mariadb
    - default: fossbilling
      envKey: PANEL_DB_NAME
      label:
        en: Database
        es-es: Base de datos
        ja: データベース
        ms: Pangkalan Data
        pt-br: Banco de Dados
        ru: База данных
        ko: 데이터베이스
        zh-hant: 資料庫
        zh: 数据库
        tr: Veritabanı
      required: true
      random: true
      type: text
    - default: fossbilling
      envKey: PANEL_DB_USER
      label:
        en: Database User
        es-es: Usuario de la base de datos
        ja: データベースユーザー
        ms: Pengguna Pangkalan Data
        pt-br: Usuário do Banco de Dados
        ru: Пользователь базы данных
        ko: 데이터베이스 사용자
        zh-hant: 資料庫用戶
        zh: 数据库用户
        tr: Veritabanı Kullanıcısı
      required: true
      random: true
      type: text
    - default: fossbilling
      envKey: PANEL_DB_USER_PASSWORD
      label:
        en: Database Password
        es-es: Contraseña de la base de datos
        ja: データベースのパスワード
        ms: Kata Laluan Pangkalan Data
        pt-br: Senha do Banco de Dados
        ru: Пароль базы данных
        ko: 데이터베이스 비밀번호
        zh-hant: 資料庫密碼
        zh: 数据库密码
        tr: Veritabanı Parolası
      required: true
      type: password
      random: true
    - default: 8080
      envKey: PANEL_APP_PORT_HTTP
      label:
        en: Port
        es-es: Puerto
        ja: ポート
        ms: Port
        pt-br: Porta
        ru: Порт
        ko: 포트
        zh-hant: 埠
        zh: 端口
        tr: Bağlantı Noktası
      required: true
      type: number
      rule: paramPort
    - default: https://billing.example.com
      envKey: FOSSBILLING_APP_URL
      label:
        en: Application URL
        es-es: URL de la aplicación
        ja: アプリケーションURL
        ms: URL Aplikasi
        pt-br: URL da Aplicação
        ru: URL приложения
        ko: 애플리케이션 URL
        zh-hant: 應用程式網址
        zh: 应用URL
        tr: Uygulama URL'si
      required: true
      type: text
    - default: admin
      envKey: FOSSBILLING_ADMIN_USER
      label:
        en: Admin Username
        es-es: Nombre de usuario del administrador
        ja: 管理者ユーザー名
        ms: Nama Pengguna Admin
        pt-br: Nome de Usuário do Administrador
        ru: Имя пользователя администратора
        ko: 관리자 사용자 이름
        zh-hant: 管理員用戶名
        zh: 管理员用户名
        tr: Yönetici Kullanıcı Adı
      required: true
      type: text
    - default: Admin123!
      envKey: FOSSBILLING_ADMIN_PASSWORD
      label:
        en: Admin Password
        es-es: Contraseña del administrador
        ja: 管理者パスワード
        ms: Kata Laluan Admin
        pt-br: Senha do Administrador
        ru: Пароль администратора
        ko: 관리자 비밀번호
        zh-hant: 管理員密碼
        zh: 管理员密码
        tr: Yönetici Parolası
      required: true
      type: password
      random: true
