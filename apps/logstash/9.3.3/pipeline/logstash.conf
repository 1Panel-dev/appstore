input {
  beats {
    port => 5044
  }
}

# This package keeps the default experience simple by writing received events
# to the container logs. In a typical 1Panel deployment, Logstash and
# Elasticsearch can reach each other over the shared 1panel-network by using
# the Elasticsearch service name `elasticsearch`.
# Reference:
# https://www.elastic.co/docs/reference/beats/filebeat/logstash-output
output {
  stdout {}

  # elasticsearch {
  #   hosts => ["http://elasticsearch:9200"]
  #   index => "%{[@metadata][beat]}-%{[@metadata][version]}"
  #   action => "create"
  #
  #   # If your Elasticsearch app enables password verification, also
  #   # uncomment the credentials below and replace the password value.
  #   # user => "elastic"
  #   # password => "YOUR_PASSWORD"
  # }
}
