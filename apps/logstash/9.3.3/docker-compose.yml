services:
  logstash:
    image: logstash:9.3.3
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_BEATS}:5044"
      - "${PANEL_APP_PORT_API}:9600"
    volumes:
      - "./pipeline:/usr/share/logstash/pipeline:ro"
      - "./data:/usr/share/logstash/data"
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true
