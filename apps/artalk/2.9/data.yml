        ko: 포트
        ms: Port
        pt-br: Porta
        ru: Порт
        tr: Bağlantı Noktası
      required: true
      rule: paramPort
      type: number
    - default: "My Blog Site"
      edit: true
      envKey: ATK_SITE_DEFAULT
      labelEn: Default Site Name
      labelZh: 站点名称
      label:
