additionalProperties:
  formFields:
    - default: "23366"
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: 端口
      label:
        en: Port
        zh: 端口
        es-es: Puerto
        zh-Hant: 埠
