      envKey: ATK_LOCALE
      labelEn: Locale
      labelZh: 语言
      label:
        en: Locale
        zh: 语言
        es-es: Configuración regional
        zh-Hant: 語言環境
        ja: ロケール
        ko: 로케일
        ms: Lokal
        pt-br: Localidade
        ru: Локаль
        tr: Yerel Ayar
      required: true
      type: select
      values:
        - label: 简体中文
          value: "zh-CN"
        - label: 繁体中文
          value: "zh-TW"
        - label: English
          value: "en"
        - label: 日本語
          value: "ja"
        - label: 한국어
          value: "ko"
    - default: Asia/Shanghai
      envKey: TZ
      labelEn: Time Zone
      labelZh: 时区
      label:
        en: Time Zone
        zh: 时区
        es-es: Zona horaria
        zh-Hant: 時區
        ja: タイムゾーン
        ko: 시간대
