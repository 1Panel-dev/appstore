        zh: 站点名称
        es-es: Default Site Nombre
        zh-Hant: 預設站點名稱
        ja: デフォルトサイト名
        ko: 기본 사이트 이름
        ms: Nama tapak lalai
        pt-br: Nome padrão do site
        ru: Имя сайта по умолчанию
        tr: Varsayılan site adı
      required: false
      type: text
    - default: "https://example.myblog.com"
      edit: true
      envKey: ATK_SITE_URL
      labelEn: Default Site Url
      labelZh: 站点地址
      label:
        en: Default Site Url
        zh: 站点地址
        es-es: URL del sitio predeterminada
        zh-Hant: 預設站點網址
        ja: デフォルトサイトURL
        ko: 기본 사이트 URL
