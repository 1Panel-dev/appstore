services:
  music-tag-web:
    image: xhongc/music_tag_web:2.7.1
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:8001
    volumes:
      - ./data:/app/media:rw
      - ./config:/app/data
    command: /start
    labels:  
      createdBy: "Apps"
networks:  
  1panel-network:  
    external: true
