services:
  hermes-agent:
    container_name: ${CONTAINER_NAME}
    image: 1panel/hermes-agent:2026.4.16
    restart: unless-stopped
    networks:
      - 1panel-network
    environment:
      HOME: /opt/data/home
      HERMES_HOME: /opt/data
      HERMES_RUN_MODE: both
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: 9119
      HERMES_DASHBOARD_NO_OPEN: "1"
      TERM: xterm-256color
    volumes:
      - ./data:/opt/data
      - /etc/localtime:/etc/localtime
    ports:
      - ${PANEL_APP_PORT_HTTP}:9119
    init: true
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
