services:
  rsshub:
    image: diygod/rsshub:chromium-bundled-2026-04-19
    container_name: ${CONTAINER_NAME}
    restart: always
    ports:
      - "${PANEL_APP_PORT_HTTP}:1200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1200/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - 1panel-network
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: "redis://:${PANEL_REDIS_PASSWORD}@${PANEL_REDIS_HOST}:${PANEL_REDIS_PORT}/"
      PUPPETEER_WS_ENDPOINT: "ws://${PANEL_BROWSERLESS_HOST}:${PANEL_BROWSERLESS_PORT}"
networks:
  1panel-network:
    external: true
