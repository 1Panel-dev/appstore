additionalProperties:
  formFields:
    - default: postgres
      envKey: PANEL_DB_ROOT_USER
      label:
        en: Username
        ja: ユーザー名
        ms: Nama pengguna
        pt-br: Nome de usuário
        ru: Имя пользователя
        ko: 사용자 이름
        zh-hant: 用戶名
        zh: 用户名
      required: true
      rule: paramCommon
      type: text
      disabled: true
    - default: password
      envKey: PANEL_DB_ROOT_PASSWORD
      label:
        en: Password
        ja: パスワード
        ms: Kata laluan
        pt-br: Senha
        ru: Пароль
        ko: 비밀번호
        zh-hant: 密碼
        zh: 密码
      random: true
      required: true
      type: password
    - default: 5432
      envKey: PANEL_APP_PORT_HTTP
      label:
        en: Port
        ja: ポート
        ms: Port
        pt-br: Porta
        ru: Порт
        ko: 포트
        zh-Hant: 埠
        zh: 端口
      required: true
      rule: paramPort
      type: number
