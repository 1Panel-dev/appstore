additionalProperties:
  formFields:
    - default: postgres
      envKey: PANEL_DB_ROOT_USER
      label:
        en: Username
        es-es: Nombre de usuario
        ja: ユーザー名
        ms: Nama pengguna
        pt-br: Nome de usuário
        ru: Имя пользователя
        ko: 사용자 이름
        zh-hant: 用戶名
        zh: 用户名
        tr: Kullanıcı Adı
      required: true
      type: text
      disabled: true
    - default: password
      envKey: PANEL_DB_ROOT_PASSWORD
      label:
        en: Password
        es-es: Contraseña
        ja: パスワード
        ms: Kata laluan
        pt-br: Senha
        ru: Пароль
        ko: 비밀번호
        zh-hant: 密碼
        zh: 密码
        tr: Parola
      required: true
      type: text
      disabled: true
    - default: 5432
      envKey: PANEL_APP_PORT_HTTP
      label:
        en: Port
        es-es: Puerto
        ja: ポート
        ms: Port
        pt-br: Porta
        ru: Порт
        ko: 포트
        zh-Hant: 埠
        zh: 端口
        tr: Bağlantı Noktası
      required: true
      rule: paramPort
      type: number
    - default: replica_user
      envKey: REPLICATION_USER
      disabled: true
      required: true
      type: text
      label:
        en: Replication User
        es-es: Replication Usuario
        ja: レプリケーションユーザー
        ms: Pengguna Replikasi
        pt-br: Usuário de Replicação
