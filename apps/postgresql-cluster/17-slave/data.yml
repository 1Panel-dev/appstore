        ko: 복제 사용자
        zh-Hant: 複製使用者
        zh: 复制用户
        tr: Replication Kullanıcı
    - default: replica_passwd
      envKey: REPLICATION_PASSWORD
      required: true
      type: text
      disabled: true
      label:
        en: Replication Password
        es-es: Replication Contraseña
        ja: レプリケーションパスワード
        ms: Kata Laluan Replikasi
        pt-br: Senha de Replicação
        ru: Пароль репликации
        ko: 복제 비밀번호
        zh-Hant: 複製密碼
        zh: 复制密码
        tr: Replication Parola
    - default: ''
      envKey: MASTER_HOST
      required: true
      type: text
      label:
        en: Master Host
        es-es: Host maestro
        ja: マスターホスト
        ms: Host Utama
        pt-br: Host Mestre
        ru: Хост мастера
        ko: 마스터 호스트
        zh-Hant: 主节点 IP
        zh: 主节点 IP
        tr: Ana host
    - default: 3306
      envKey: MASTER_PORT
      disabled: true
      required: true
      type: text
      label:
        en: Master Port
        es-es: Master Puerto
        ja: マスターポート
        ms: Port Utama
        pt-br: Porta Mestre
        ru: Порт мастера
        ko: 마스터 포트
        zh-Hant: 主节点端口
        zh: 主节点端口
        tr: Master Bağlantı Noktası
