services:
  valkey:
    image: valkey/valkey:8.0.7
    restart: always
    container_name: ${CONTAINER_NAME}
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:6379
    command: valkey-server
    volumes:
      - ./data:/data
    environment:
      VALKEY_EXTRA_FLAGS: "--save 60 1 --loglevel warning --requirepass ${PANEL_VALKEY_ROOT_PASSWORD}"
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true
