    - envKey: BASE_URL
      default: ""
      edit: false
      labelEn: Base URL
      labelZh: Base URL
      required: false
      type: text
      label:
        en: Base URL
        es-es: URL base
        ja: Base URL
        ms: Base URL
        pt-br: Base URL
        ru: Base URL
        ko: Base URL
        zh-Hant: Base URL
        zh: Base URL
        tr: Temel URL
      description:
        en: "When using Ollama, you need to fill in this field, for example: http://192.168.1.2:11434/v1"
        ja: "Ollama を使用する場合は、このフィールドに記入する必要があります。例：http://192.168.1.2:11434/v1"
        ms: "Apabila menggunakan Ollama, anda perlu mengisi medan ini, contohnya: http://192.168.1.2:11434/v1"
        pt-br: "Ao usar o Ollama, você precisa preencher este campo, por exemplo: http://192.168.1.2:11434/v1"
        ru: "При использовании Ollama необходимо заполнить это поле, например: http://192.168.1.2:11434/v1"
        ko: "Ollama를 사용할 때 이 필드를 작성해야 합니다. 예: http://192.168.1.2:11434/v1"
        tr: "Ollama'yı kullanırken, bu alanı doldurmanız gerekir, örneğin: http://192.168.1.2:11434/v1"
        zh-hant: "使用 Ollama 時，需要填寫此欄位，例如：http://192.168.1.2:11434/v1"
        zh: "当使用 Ollama 的时候，需要填写此项，例如：http://192.168.1.2:11434/v1"
        es-es: "Cuando use Ollama, debe completar este campo; por ejemplo: http://192.168.1.2:11434/v1"
    - envKey: ALLOWED_ORIGIN
      default: ""
      labelEn: External Access Address
      labelZh: 外部访问地址
      required: true
      type: text
      label:
        en: External Access Address
        es-es: External Access Dirección
        ja: 外部アクセスアドレス
        ms: Alamat Akses Luaran
        pt-br: Endereço de Acesso Externo
        ru: Адрес внешнего доступа
        ko: 외부 접속 주소
        zh-Hant: 外部訪問地址
        zh: 外部访问地址
        tr: External Access Adres
      description:
        en: "The default access URL is https://IP:Port and HTTPS is required"
        ja: "デフォルトのアクセスURLは https://IP:Port であり、HTTPSが必要です"
        ms: "URL akses lalai ialah https://IP:Port dan HTTPS diperlukan"
        pt-br: "O URL de acesso padrão é https://IP:Port e o HTTPS é obrigatório"
        ru: "URL доступа по умолчанию: https://IP:Port, требуется HTTPS"
        ko: "기본 액세스 URL은 https://IP:Port이며 HTTPS가 필요합니다"
        tr: "Varsayılan erişim URL'si https://IP:Port ve HTTPS gereklidir"
        zh-hant: "預設訪問地址為 https://IP:Port，強制使用 HTTPS 協議"
        zh: "默认访问地址为 https://IP:Port，强制使用 HTTPS 协议"
        es-es: "La URL de acceso predeterminada es https://IP:Puerto y se requiere HTTPS"
    - default: ""
      disabled: true
      envKey: OPENCLAW_GATEWAY_TOKEN
      labelEn: Token
      labelZh: 令牌
      label:
        en: Token
        es-es: Token de acceso
        ja: トークン
        ms: Token
        pt-br: Token
        ru: Токен
        ko: 토큰
        zh-Hant: 權杖
        zh: 令牌
        tr: Belirteç
      description:
        en: "After installation, enter the installation directory and obtain the Token from the ./data/conf/openclaw.json file. You can later click the Parameters button to edit the application and enter the Token into the input field for convenient use.\nAfter opening the page in your browser, append ?token=xxx to the URL, for example: http://your_address:port?token=xxx, to access it."
        ja: "インストール後、インストールディレクトリに入り、./data/conf/openclaw.json ファイルからトークンを取得します。後でパラメータボタンをクリックしてアプリケーションを編集し、そのトークンを入力フィールドに入力して便利に使用できます。\nブラウザでページを開いた後、URL に ?token=xxx を追加します。例：http://your_address:port?token=xxx でアクセスできます。"
        ms: "Selepas pemasangan, masuk ke direktori pemasangan dan dapatkan Token dari fail ./data/conf/openclaw.json. Anda boleh klik butang Parameter kemudian untuk mengedit aplikasi dan masukkan Token ke dalam medan input untuk kemudahan penggunaan.\nSelepas membuka halaman di pelayar anda, tambahkan ?token=xxx pada URL, contohnya: http://your_address:port?token=xxx, untuk mengaksesnya."
        pt-br: "Após a instalação, entre no diretório de instalação e obtenha o Token do arquivo ./data/conf/openclaw.json. Você pode clicar no botão Parâmetros posteriormente para editar o aplicativo e inserir o Token no campo de entrada para uso conveniente.\nApós abrir a página no seu navegador, adicione ?token=xxx ao URL, por exemplo: http://your_address:port?token=xxx, para acessá-lo."
        ru: "После установки войдите в каталог установки и получите токен из файла ./data/conf/openclaw.json. Позже вы можете нажать кнопку Параметры, чтобы отредактировать приложение и ввести токен в поле ввода для удобного использования.\nПосле открытия страницы в вашем браузере добавьте ?token=xxx к URL, например: http://your_address:port?token=xxx, чтобы получить к нему доступ."
        ko: "설치 후 설치 디렉토리로 이동하여 ./data/conf/openclaw.json 파일에서 토큰을 가져옵니다. 나중에 매개변수 버튼을 클릭하여 애플리케이션을 편집하고 입력 필드에 토큰을 입력하여 편리하게 사용할 수 있습니다.\n브라우저에서 페이지를 연 후 URL에 ?token=xxx를 추가합니다. 예: http://your_address:port?token=xxx에 액세스할 수 있습니다."
        tr: "Yüklemeden sonra, yükleme dizinine girin ve ./data/conf/openclaw.json dosyasından Token'ı alın. Daha sonra Parametreler düğmesine tıklayarak uygulamayı düzenleyebilir ve Token'ı giriş alanına girerek kolay kullanım sağlayabilirsiniz.\nTarayıcınızda sayfayı açtıktan sonra URL'ye ?token=xxx ekleyin, örneğin: http://your_address:port?token=xxx, erişmek için."
        zh-hant: "安裝成功後，進入安裝目錄，從 ./data/conf/openclaw.json 文件中獲取 Token，後續可以點擊參數按鈕編輯應用，將該 Token 填入輸入框，方便使用。\n瀏覽器打開後，在地址欄 URL 後追加 ?token=xxx，如：http://your_address:port?token=xxx 即可訪問。"
        zh: "安装成功后，进入安装目录，从 ./data/conf/openclaw.json 文件中获取 Token，后续可以点击参数按钮编辑应用，将该 Token 填入输入框，方便使用。\n浏览器打开后，在地址栏 URL 后追加 ?token=xxx，如：http://your_address:port?token=xxx 即可访问。"
        es-es: "Despues de la instalacion, entre en el directorio de instalacion y obtenga el token del archivo ./data/conf/openclaw.json. Mas adelante puede hacer clic en el boton Parametros para editar la aplicacion e introducir el token en el campo correspondiente para usarlo comodamente.\nDespues de abrir la pagina en el navegador, anada ?token=xxx a la URL, por ejemplo: http://your_address:port?token=xxx, para acceder."
      type: text
      edit: true
