services:
  clawswarm:
    container_name: ${CONTAINER_NAME}
    image: 1panel/clawswarm:v1.0.2
    restart: always
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:18080
    volumes:
      - ./data:/opt/clawswarm
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
