services:
  elizabeth:
    image: yunique001/elizabeth:1.4.0
    container_name: "${CONTAINER_NAME}"
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:4092"
    environment:
      JWT_SECRET: "${JWT_SECRET}"
      DATABASE_URL: "${DATABASE_URL}"
      ROOM_MAX_SIZE: "${ROOM_MAX_SIZE}"
      ROOM_MAX_TIMES_ENTERED: "${ROOM_MAX_TIMES_ENTERED}"
      ROOM_ALLOWED_AGES: "${ROOM_ALLOWED_AGES}"
      ROOM_DEFAULT_AGE: "${ROOM_DEFAULT_AGE}"
      ROOM_SHARE_DISABLED_LOCK_DURATION: "${ROOM_SHARE_DISABLED_LOCK_DURATION}"
    volumes:
      - ./data:/app/data
      - ./data/storage:/app/storage
    healthcheck:
      test:
        - CMD
        - curl
        - "-f"
        - http://127.0.0.1:4092/api/v1/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      createdBy: Apps
networks:
  1panel-network:
    external: true
