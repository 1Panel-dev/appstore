services:
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.1
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
    # masterkey (exactly 32 chars) is optional in the form: if provided it is
    # validated and used by scripts/init.sh (enables migrating an existing
    # instance), otherwise a strong random key is generated. Either way it ends
    # up in ./conf/.env as ZITADEL_MASTERKEY, read via --masterkeyFromEnv.
    # tlsMode also controls ExternalSecure (the flag overrides the env var):
    # external = behind HTTPS reverse proxy, disabled = plain HTTP access.
    command: 'start-from-init --masterkeyFromEnv --tlsMode ${ZITADEL_TLSMODE}'
    env_file:
      - ./conf/.env
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: ${PANEL_DB_HOST}
      ZITADEL_DATABASE_POSTGRES_PORT: ${PANEL_DB_PORT}
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${PANEL_DB_NAME}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${PANEL_DB_USER}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${PANEL_DB_USER_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${PANEL_DB_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${PANEL_DB_USER_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT}
      # TLS is never terminated inside this container (proxy or plain HTTP).
      # Also required by the `zitadel ready` healthcheck, which runs as a
      # separate process and does not see the --tlsMode start flag.
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD}
      # Since v4, new instances require the separate Login V2 container by default.
      # This template is single-container, so keep the built-in v1 login;
      # otherwise the login page would be unreachable after install.
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
