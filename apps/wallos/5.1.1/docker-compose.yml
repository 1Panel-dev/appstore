services:
  wallos:
    image: bellamy/wallos:5.1.1
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:80"
    volumes:
      - ./data/db:/var/www/html/db
      - ./data/logos:/var/www/html/images/uploads/logos
    environment:
      - TZ=${TIME_ZONE}
    healthcheck:
      test: ["NONE"]
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true
