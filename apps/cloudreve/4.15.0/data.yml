additionalProperties:
  formFields:
    - default: postgres
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      label:
        en: Database Service
        es-es: Servicio de base de datos
        ja: データベースサービス
        ms: Perkhidmatan Pangkalan Data
        pt-br: Serviço de Banco de Dados
        ru: Сервис базы данных
        ko: 데이터베이스 서비스
        zh: 数据库服务
        zh-Hant: 數據庫 服務
        tr: Veritabanı Hizmeti
      required: true
      type: apps
      child:
        default: ""
        envKey: PANEL_DB_HOST
        required: true
        type: service
      values:
        - label: PostgreSQL
          value: postgres
        - label: MySQL
          value: mysql
        - label: MariaDB
          value: mariadb
    - default: cloudreve
      envKey: PANEL_DB_NAME
      labelEn: Database
      labelZh: 数据库名
      label:
        en: Database
        es-es: Base de datos
        ja: データベース
        ms: Pangkalan Data
        pt-br: Banco de Dados
        ru: База данных
        ko: 데이터베이스
        zh: 数据库名
        zh-Hant: 數據庫名
        tr: Veritabanı
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: cloudreve
      envKey: PANEL_DB_USER
      labelEn: User
      labelZh: 数据库用户
      label:
        en: User
        es-es: Usuario
        ja: ユーザー
        ms: Pengguna
        pt-br: Usuário
        ru: Пользователь
        ko: 사용자
        zh: 数据库用户
        zh-Hant: 數據庫用戶
        tr: Kullanıcı
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: cloudreve
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Password
      labelZh: 数据库用户密码
      label:
        en: Password
        es-es: Contraseña
        ja: パスワード
        ms: Kata Laluan
        pt-br: Senha
        ru: Пароль
        ko: 비밀번호
        zh: 数据库用户密码
        zh-Hant: 數據庫用戶密碼
        tr: Parola
      random: true
      required: true
      type: password
    - default: ""
      envKey: PANEL_REDIS_HOST
      key: redis
      labelEn: Redis Service
      labelZh: redis 服务
      required: true
      type: service
      label:
        en: Redis Service
        es-es: Servicio de Redis
        ja: Redisサービス
        ms: Perkhidmatan Redis
        pt-br: Serviço Redis
        ru: Сервис Redis
        ko: Redis 서비스
        zh: redis 服务
        zh-Hant: redis 服务
        tr: Redis Hizmeti
    - default: ""
      envKey: PANEL_REDIS_ROOT_PASSWORD
      labelEn: Redis Service Password
      labelZh: 缓存服务服务密码
      label:
        en: Redis Service Password
        zh: 缓存服务服务密码
        es-es: Redis Servicio Contraseña
        zh-Hant: Redis 服務密碼
        ja: Redis サービスパスワード
        ko: Redis 서비스 비밀번호
        ms: Kata Laluan Perkhidmatan Redis
        pt-br: Senha do Serviço Redis
        ru: Пароль службы Redis
        tr: Redis Hizmet Parolası
      required: false
      type: password
    - default: 40033
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: 端口
      label:
        en: Port
        es-es: Puerto
        ja: ポート
        ms: Port
        pt-br: Porta
        ru: Порт
        ko: 포트
        zh: 端口
        zh-Hant: 埠
        tr: Bağlantı Noktası
      required: true
      rule: paramPort
      type: number
