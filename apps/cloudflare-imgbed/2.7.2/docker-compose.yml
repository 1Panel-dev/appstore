services:
  cloudflare-imgbed:
    image: marseventh/cloudflare-imgbed:2.7.2
    container_name: "${CONTAINER_NAME}"
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
    volumes:
      - ./data:/app/data
    labels:
      createdBy: Apps
networks:
  1panel-network:
    external: true
