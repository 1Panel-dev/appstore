additionalProperties:
  formFields:
    - child:
        default: ""
        envKey: PANEL_DB_HOST
        required: true
        type: service
      default: mysql
      envKey: PANEL_DB_TYPE
      label:
        en: Database Service
        es-es: Servicio de base de datos
        ja: データベースサービス
        ms: Perkhidmatan Pangkalan Data
        pt-br: Serviço de Banco de Dados
        ru: Сервис баз данных
        ko: 데이터베이스 서비스
        zh-hant: 資料庫服務
        zh: 数据库服务
        tr: Veritabanı Hizmeti
      required: true
      type: apps
      values:
        - label: MySQL
          value: mysql
    - default: ghost
      envKey: PANEL_DB_NAME
      label:
        en: Database
        es-es: Base de datos
        ja: データベース
        ms: Pangkalan Data
        pt-br: Banco de Dados
        ru: База данных
        ko: 데이터베이스
        zh-hant: 資料庫
        zh: 数据库
        tr: Veritabanı
      required: true
      random: true
      type: text
    - default: ghost
      envKey: PANEL_DB_USER
      label:
        en: Database User
        es-es: Usuario de la base de datos
        ja: データベースユーザー
        ms: Pengguna Pangkalan Data
        pt-br: Usuário do Banco de Dados
        ru: Пользователь базы данных
        ko: 데이터베이스 사용자
        zh-hant: 資料庫用戶
        zh: 数据库用户
