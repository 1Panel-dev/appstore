        zh: 端口
        tr: Bağlantı Noktası
      required: true
      type: number
      rule: paramPort
    - default: https://blog.domain.com
      envKey: GHOST_URL
      label:
        en: Site URL
        es-es: URL del sitio
        ja: サイトURL
        ms: URL Laman
        pt-br: URL do Site
        ru: URL сайта
        ko: 사이트 URL
        zh-hant: 網站網址
        zh: 网站地址
        tr: Site URL'si
      required: true
      type: text
