additionalProperties:
  formFields:
    - child:
        default: ""
        envKey: PANEL_DB_HOST
        labelEn: Database Service
        labelZh: 数据库服务
        label:
          en: Database Service
          es-es: Servicio de base de datos
          zh: 数据库服务
          zh-Hant: 資料庫服務
          ja: データベースサービス
          ko: 데이터베이스 서비스
          ru: Служба базы данных
          ms: Perkhidmatan Pangkalan Data
          pt-br: Serviço de Banco de Dados
          tr: Veritabanı Hizmeti
        required: true
        type: service
      default: postgresql
      envKey: PANEL_DB_TYPE
      labelEn: Database
      labelZh: 数据库服务
      label:
        en: Database
        es-es: Base de datos
        zh: 数据库服务
        zh-Hant: 資料庫服務
        ja: データベース
        ko: 데이터베이스
        ru: База данных
        ms: Pangkalan Data
        pt-br: Banco de dados
        tr: Veritabanı
      required: true
      type: apps
      values:
        - label: PostgreSQL
          value: postgresql
    - default: sub2api
      edit: true
      envKey: PANEL_DB_NAME
      labelEn: Database Name
      labelZh: 数据库名
      label:
        en: Database Name
        es-es: Nombre de la base de datos
        zh: 数据库名
        zh-Hant: 資料庫名稱
        ja: データベース名
        ko: 데이터베이스 이름
        ru: Имя базы данных
        ms: Nama pangkalan data
        pt-br: Nome do banco de dados
        tr: Veritabanı Adı
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: sub2api
      edit: true
      envKey: PANEL_DB_USER
      labelEn: Database User
      labelZh: 数据库用户
      label:
        en: Database User
        es-es: Usuario de base de datos
        zh: 数据库用户
        zh-Hant: 資料庫使用者
        ja: データベースユーザー
        ko: 데이터베이스 사용자
        ru: Пользователь базы данных
        ms: Nama pengguna pangkalan data
        pt-br: Usuário do banco de dados
        tr: Veritabanı Kullanıcısı
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: 5432
      edit: true
      envKey: PANEL_DB_PORT
      labelEn: Database Port
      labelZh: 数据库端口
      label:
        en: Database Port
        es-es: Puerto de base de datos
        zh: 数据库端口
        zh-Hant: 資料庫連接埠
        ja: データベースポート
        ko: 데이터베이스 포트
        ru: Порт базы данных
        ms: Port pangkalan data
        pt-br: Porta do banco de dados
        tr: Veritabanı Bağlantı Noktası
      required: true
      rule: paramPort
      type: number
    - default: ""
      edit: true
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Database Password
      labelZh: 数据库用户密码
      label:
        en: Database Password
        es-es: Contraseña de base de datos
        zh: 数据库用户密码
        zh-Hant: 資料庫使用者密碼
        ja: データベースパスワード
        ko: 데이터베이스 비밀번호
        ru: Пароль базы данных
        ms: Kata laluan pangkalan data
        pt-br: Senha do banco de dados
        tr: Veritabanı Parolası
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: ""
      edit: true
      envKey: PANEL_REDIS_HOST
      key: redis
      labelEn: Redis Service
      labelZh: Redis服务
      label:
        en: Redis Service
        es-es: Servicio Redis
        zh: Redis服务
        zh-Hant: Redis 服務
        ja: Redis サービス
        ko: Redis 서비스
        ru: Служба Redis
        ms: Perkhidmatan Redis
        pt-br: Serviço Redis
        tr: Redis Hizmeti
      required: true
      type: service
    - default: 6379
      edit: true
      envKey: PANEL_REDIS_PORT
      labelEn: Redis Service Port
      labelZh: Redis服务端口
      label:
        en: Redis Service Port
        es-es: Puerto del servicio Redis
        zh: Redis服务端口
        zh-Hant: Redis 服務連接埠
        ja: Redis サービスポート
        ko: Redis 서비스 포트
        ru: Порт службы Redis
        ms: Port Perkhidmatan Redis
        pt-br: Porta do serviço Redis
        tr: Redis Hizmet Bağlantı Noktası
      required: true
      rule: paramPort
      type: number
    - default: ""
      edit: true
      envKey: PANEL_REDIS_ROOT_PASSWORD
      labelEn: Redis Password
      labelZh: Redis 密码
      label:
        en: Redis Password
        es-es: Contraseña de Redis
        zh: Redis 密码
        zh-Hant: Redis 密碼
        ja: Redis パスワード
        ko: Redis 비밀번호
        ru: Пароль Redis
        ms: Kata laluan Redis
        pt-br: Senha do Redis
        tr: Redis Parolası
      random: true
      required: true
      type: password
    - default: 0
      edit: true
      envKey: REDIS_DB
      labelEn: Redis Database
      labelZh: Redis 数据库
      label:
        en: Redis Database
        es-es: Base de datos Redis
        zh: Redis 数据库
        zh-Hant: Redis 資料庫
        ja: Redis データベース
        ko: Redis 데이터베이스
        ru: База данных Redis
        ms: Pangkalan Data Redis
        pt-br: Banco de dados Redis
        tr: Redis Veritabanı
      required: true
      type: number
    - default: 8080
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Web Port
      labelZh: Web 访问端口
      label:
        en: Web Port
        es-es: Puerto web
        zh: Web 访问端口
        zh-Hant: Web 訪問埠
        ja: Webポート
        ko: 웹 포트
        ru: Веб-порт
        ms: Port Web
        pt-br: Porta Web
        tr: Web Bağlantı Noktası
      required: true
      rule: paramPort
      type: number
    - default: Asia/Shanghai
      edit: true
      envKey: TZ
      labelEn: Timezone
      labelZh: 时区
      label:
        en: Timezone
        es-es: Zona horaria
        zh: 时区
        zh-Hant: 時區
        ja: タイムゾーン
        ko: 시간대
        ru: Часовой пояс
        ms: Zon masa
        pt-br: Fuso horário
        tr: Saat Dilimi
      required: true
      type: text
    - default: release
      edit: true
      envKey: SERVER_MODE
      labelEn: Server Mode
      labelZh: 服务模式
      label:
        en: Server Mode
        es-es: Modo de servidor
        zh: 服务模式
        zh-Hant: 服務模式
        ja: サーバーモード
        ko: 서버 모드
        ru: Режим сервера
        ms: Mod pelayan
        pt-br: Modo do servidor
        tr: Sunucu Modu
      required: true
      type: select
      values:
        - label: release
          value: release
        - label: debug
          value: debug
    - default: standard
      edit: true
      envKey: RUN_MODE
      labelEn: Run Mode
      labelZh: 运行模式
      label:
        en: Run Mode
        es-es: Modo de ejecución
        zh: 运行模式
        zh-Hant: 運行模式
        ja: 実行モード
        ko: 실행 모드
        ru: Режим работы
        ms: Mod jalanan
        pt-br: Modo de execução
        tr: Çalışma Modu
      required: true
      type: select
      values:
        - label: standard
          value: standard
        - label: simple
          value: simple
    - default: admin@sub2api.local
      edit: true
      envKey: ADMIN_EMAIL
      labelEn: Admin Email
      labelZh: 管理员邮箱
      label:
        en: Admin Email
        es-es: Correo electrónico del administrador
        zh: 管理员邮箱
        zh-Hant: 管理員郵箱
        ja: 管理者メール
        ko: 관리자 이메일
        ru: Email администратора
        ms: E-mel pentadbir
        pt-br: E-mail do administrador
        tr: Yönetici E-postası
      required: true
      type: text
    - default: ""
      edit: true
      envKey: ADMIN_PASSWORD
      labelEn: Admin Password
      labelZh: 管理员密码
      label:
        en: Admin Password
        es-es: Contraseña del administrador
        zh: 管理员密码
        zh-Hant: 管理員密碼
        ja: 管理者パスワード
        ko: 관리자 비밀번호
        ru: Пароль администратора
        ms: Kata laluan pentadbir
        pt-br: Senha do administrador
        tr: Yönetici Parolası
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: ""
      edit: true
      envKey: JWT_SECRET
      labelEn: JWT Secret (blank to auto-generate)
      labelZh: JWT 密钥（留空自动生成）
      label:
        en: JWT Secret (blank to auto-generate)
        es-es: Secreto JWT (dejar en blanco para generar automáticamente)
        zh: JWT 密钥（留空自动生成）
        zh-Hant: JWT 金鑰（留空自動產生）
        ja: JWT シークレット（空欄で自動生成）
        ko: JWT 시크릿(비워 두면 자동 생성)
        ru: JWT-секрет (пусто = создать автоматически)
        ms: Rahsia JWT (kosong untuk jana automatik)
        pt-br: Segredo JWT (vazio para gerar automaticamente)
        tr: JWT Gizli Anahtarı (otomatik oluşturmak için boş bırakın)
      required: false
      type: password
    - default: ""
      edit: true
      envKey: TOTP_ENCRYPTION_KEY
      labelEn: TOTP Encryption Key (blank to auto-generate)
      labelZh: TOTP 加密密钥（留空自动生成）
      label:
        en: TOTP Encryption Key (blank to auto-generate)
        es-es: Clave de cifrado TOTP (dejar en blanco para generar automáticamente)
        zh: TOTP 加密密钥（留空自动生成）
        zh-Hant: TOTP 加密金鑰（留空自動產生）
        ja: TOTP 暗号化キー（空欄で自動生成）
        ko: TOTP 암호화 키(비워 두면 자동 생성)
        ru: Ключ TOTP (пусто = создать автоматически)
        ms: Kunci TOTP (kosong untuk jana automatik)
        pt-br: Chave TOTP (vazia para gerar automaticamente)
        tr: TOTP Şifreleme Anahtarı (otomatik oluşturmak için boş bırakın)
      required: false
      type: password
    - default: ""
      edit: true
      envKey: UPDATE_PROXY_URL
      labelEn: Update Proxy URL
      labelZh: 更新代理地址
      label:
        en: Update Proxy URL
        es-es: URL del proxy de actualización
        zh: 更新代理地址
        zh-Hant: 更新代理地址
        ja: 更新プロキシ URL
        ko: 업데이트 프록시 URL
        ru: URL прокси для обновлений
        ms: URL proksi kemas kini
        pt-br: URL do proxy de atualização
        tr: Güncelleme proxy URL'si
      required: false
      rule: paramExtUrl
      type: text
