services:
  copaw:
    container_name: ${CONTAINER_NAME}
    image: agentscope/qwenpaw:v1.1.3
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:8088
    environment:
      - COPAW_AUTH_ENABLED=true
    volumes:
      - ./data:/app/working
      - ./secret:/app/working.secret
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true
