additionalProperties:
  formFields:
    - default: mysql
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      required: true
      type: apps
      child:
        default: ""
        envKey: PANEL_DB_HOST
        required: true
        type: service
      values:
        - label: MySQL
          value: mysql
        - label: PostgreSQL
          value: postgres
        - label: MariaDB
          value: mariadb
      label:
        en: Database Service
        es-es: Servicio de base de datos
        ja: データベースサービス
        ms: Perkhidmatan Pangkalan Data
        pt-br: Serviço de Banco de Dados
        ru: Сервис баз данных
        ko: 데이터베이스 서비스
        zh-hant: 資料庫服務
        zh: 数据库服务
        tr: Veritabanı Hizmeti
    - default: gitea
      envKey: PANEL_DB_NAME
      labelEn: Database
      labelZh: 数据库名
      random: true
      required: true
      rule: paramCommon
      type: text
      label:
        en: Database
        es-es: Base de datos
        ja: データベース
        ms: Pangkalan Data
        pt-br: Banco de Dados
        ru: База данных
        ko: 데이터베이스
        zh-hant: 資料庫
        zh: 数据库
        tr: Veritabanı
    - default: gitea
      envKey: PANEL_DB_USER
      random: true
      required: true
      rule: paramCommon
      type: text
      labelEn: Database User
      labelZh: 数据库用户
      label:
        en: Database User
        es-es: Usuario de la base de datos
        ja: データベースユーザー
        ms: Pengguna Pangkalan Data
        pt-br: Usuário do Banco de Dados
        ru: Пользователь базы данных
        ko: 데이터베이스 사용자
        zh-hant: 資料庫用戶
        zh: 数据库用户
        tr: Veritabanı Kullanıcısı
    - default: gitea
      envKey: PANEL_DB_USER_PASSWORD
      random: true
      required: true
      type: password
      labelEn: Database Password
      labelZh: 数据库密码
      label:
        en: Database Password
        es-es: Contraseña de la base de datos
        ja: データベースのパスワード
        ms: Kata Laluan Pangkalan Data
        pt-br: Senha do Banco de Dados
        ru: Пароль базы данных
        ko: 데이터베이스 비밀번호
        zh-hant: 資料庫密碼
        zh: 数据库密码
        tr: Veritabanı Parolası
    - default: 3000
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: HTTP 端口
      required: true
      rule: paramPort
      type: number
      label:
        en: HTTP Port
        es-es: Puerto HTTP
        ja: HTTP ポート
        ms: Port HTTP
        pt-br: HTTP Porta
        ru: HTTP Порт
        ko: HTTP 포트
        zh-Hant: HTTP 埠
        zh: HTTP 端口
        tr: HTTP Bağlantı Noktası
    - default: 222
      envKey: PANEL_APP_PORT_SSH
      labelEn: Port
      labelZh: SSH 端口
      required: true
      rule: paramPort
      type: number
      label:
        en: SSH Port
        es-es: Puerto SSH
        ja: SSH ポート
        ms: SSH Port
        pt-br: SSH Porta
        ru: SSH Порт
        ko: SSH 포트
        zh-Hant: SSH 埠
        zh: SSH 端口
        tr: SSH Bağlantı Noktası
