services:
  sun-panel:
    image: hslr/sun-panel:1.8.1
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:3002
    volumes:
      - ./data/conf:/app/conf
      - ./data/uploads:/app/uploads
      - ./data/database:/app/database
    labels:  
      createdBy: "Apps"
networks:  
  1panel-network:  
    external: true
