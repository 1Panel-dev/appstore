        tr: "İsteğe bağlı. Ana model çok modlu desteğe sahip olmadığında görüntüleri işlemek için görüntü modeli."
        zh-hant: "可選。當主模型不支援多模態時用於處理圖像的視覺模型。"
        zh: "可选。当主模型不支持多模态时用于处理图像的视觉模型。"
        es-es: "Opcional. Modelo de visión para procesar imágenes cuando el modelo principal no tiene soporte multimodal."
