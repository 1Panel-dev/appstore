        ja: "オプション。主モデルがマルチモーダルをサポートしていない場合に画像を処理するビジョンモデル。"
        ms: "Pilihan. Model penglihatan untuk memproses imej apabila model utama tidak menyokong multimodal."
        pt-br: "Opcional. Modelo de visão para processamento de imagens quando o modelo principal não tem suporte multimodal."
