additionalProperties:
  formFields:
    # 数据库地址（支持外部数据库，如 TDSQL / MySQL / MariaDB）
    - default: ""
      edit: true
      envKey: ZABBIX_DB_HOST
      label:
        en: Database Host
        ja: データベースホスト
        ms: Hos Pangkalan Data
        pt-br: Host do Banco de Dados
        ru: Хост базы данных
        ko: 데이터베이스 호스트
        zh: 数据库地址
        zh-Hant: 資料庫主機
      required: true
      type: text
    # 数据库端口
    - default: 3306
      edit: true
      envKey: ZABBIX_DB_PORT
      label:
        en: Database Port
        ja: データベースポート
        ms: Port Pangkalan Data
        pt-br: Porta do Banco de Dados
        ru: Порт базы данных
        ko: 데이터베이스 포트
        zh: 数据库端口
        zh-Hant: 資料庫埠
      required: true
      rule: paramPort
      type: number
    # 数据库名
    - default: zabbix
      envKey: ZABBIX_DB_NAME
      label:
        en: Database Name
        ja: データベース名
        ms: Nama Pangkalan Data
        pt-br: Nome do Banco de Dados
        ru: Имя базы данных
        ko: 데이터베이스 이름
        zh: 数据库名
        zh-Hant: 資料庫名稱
      random: true
      required: true
      rule: paramCommon
      type: text
    # 数据库用户
    - default: zabbix
      envKey: ZABBIX_DB_USER
      label:
        en: Database User
        ja: データベースユーザー
        ms: Pengguna Pangkalan Data
        pt-br: Usuário do Banco de Dados
        ru: Пользователь базы данных
        ko: 데이터베이스 사용자
        zh: 数据库用户
        zh-Hant: 資料庫使用者
      random: true
      required: true
      rule: paramCommon
      type: text
    # 数据库密码
    - default: ""
      envKey: ZABBIX_DB_PASSWORD
      label:
        en: Database Password
        ja: データベースパスワード
        ms: Kata Laluan Pangkalan Data
        pt-br: Senha do Banco de Dados
        ru: Пароль базы данных
        ko: 데이터베이스 비밀번호
        zh: 数据库密码
        zh-Hant: 資料庫密碼
      random: true
      required: true
      type: password
    # 服务器名称
    - default: Zabbix
      edit: true
      envKey: ZABBIX_SERVER_NAME
      label:
        en: Server Name
        ja: サーバー名
        ms: Nama Pelayan
        pt-br: Nome do Servidor
        ru: Имя сервера
        ko: 서버 이름
        zh: 服务器名称
        zh-Hant: 伺服器名稱
      required: true
      type: text
    # Web 界面端口（使用 PANEL_APP_PORT_HTTP 前缀，1Panel 自动校验端口占用）
    - default: 8080
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      label:
        en: Web UI Port
        ja: Web UI ポート
        ms: Port UI Web
        pt-br: Porta da UI Web
        ru: Порт веб-интерфейса
        ko: 웹 UI 포트
        zh: Web 界面端口
        zh-Hant: Web 介面埠
      required: true
      rule: paramPort
      type: number
    # Agent 端口
    - default: 10051
      edit: true
      envKey: ZABBIX_SERVER_PORT
      label:
        en: Agent Port
        ja: エージェントポート
        ms: Port Agent
        pt-br: Porta do Agent
        ru: Порт агента
        ko: 에이전트 포트
        zh: Agent 端口
        zh-Hant: Agent 埠
      required: true
      rule: paramPort
      type: number
    # 时区
    - default: Asia/Shanghai
      edit: true
      envKey: PHP_TZ
      label:
        en: Timezone
        ja: タイムゾーン
        ms: Zon Waktu
        pt-br: Fuso Horário
        ru: Часовой пояс
        ko: 시간대
        zh: 时区
        zh-Hant: 時區
      required: true
      type: text
    # ========== Zabbix Agent（可选） ==========
    - default: "false"
      envKey: ZABBIX_AGENT_ENABLED
      label:
        zh: 启用 Zabbix Agent
        en: Enable Zabbix Agent
      required: true
      type: select
      values:
        - label: "关闭"
          value: "false"
        - label: "开启"
          value: "true"
    - default: 10050
      edit: true
      envKey: ZABBIX_AGENT_PORT
      label:
        zh: Agent 端口（启用后生效）
        en: Agent Port (when enabled)
      required: true
      rule: paramPort
      type: number
    # ========== Zabbix Proxy（可选） ==========
    - default: "false"
      envKey: ZABBIX_PROXY_ENABLED
      label:
        zh: 启用 Zabbix Proxy
        en: Enable Zabbix Proxy
      required: true
      type: select
      values:
        - label: "关闭"
          value: "false"
        - label: "开启"
          value: "true"
    - default: "0"
      envKey: ZABBIX_PROXY_MODE
      label:
        zh: Proxy 模式
        en: Proxy Mode
      required: true
      type: select
      values:
        - label: Active（主动推送）
          value: "0"
        - label: Passive（被动等待）
          value: "1"
    - default: 10071
      edit: true
      envKey: ZABBIX_PROXY_PORT
      label:
        zh: Proxy 端口（Passive 模式需要）
        en: Proxy Port (for passive mode)
      required: true
      rule: paramPort
      type: number
    - default: ""
      edit: true
      envKey: ZABBIX_PROXY_DB_HOST
      label:
        zh: Proxy 数据库地址
        en: Proxy DB Host
      required: false
      type: text
    - default: 3306
      edit: true
      envKey: ZABBIX_PROXY_DB_PORT
      label:
        zh: Proxy 数据库端口
        en: Proxy DB Port
      required: false
      rule: paramPort
      type: number
    - default: zabbix_proxy
      envKey: ZABBIX_PROXY_DB_NAME
      label:
        zh: Proxy 数据库名
        en: Proxy DB Name
      required: false
      type: text
    - default: zabbix
      envKey: ZABBIX_PROXY_DB_USER
      label:
        zh: Proxy 数据库用户
        en: Proxy DB User
      required: false
      type: text
    - default: ""
      envKey: ZABBIX_PROXY_DB_PASSWORD
      label:
        zh: Proxy 数据库密码
        en: Proxy DB Password
      required: false
      type: password
    # 启用 SNMP Traps
    - default: "false"
      envKey: ZABBIX_ENABLE_SNMP_TRAPS
      label:
        en: Enable SNMP Traps
        ja: SNMPトラップを有効にする
        ms: Dayakan SNMP Traps
        pt-br: Habilitar SNMP Traps
        ru: Включить SNMP Traps
        ko: SNMP 트랩 활성화
        zh: 启用 SNMP Traps
        zh-Hant: 啟用 SNMP Traps
      required: true
      type: select
      values:
        - label: "关闭"
          value: "false"
        - label: "开启"
          value: "true"
    # 启用 Java Gateway
    - default: "false"
      envKey: ZABBIX_JAVAGATEWAY
      label:
        en: Enable Java Gateway
        ja: Javaゲートウェイを有効にする
        ms: Dayakan Java Gateway
        pt-br: Habilitar Java Gateway
        ru: Включить Java Gateway
        ko: Java 게이트웨이 활성화
        zh: 启用 Java Gateway
        zh-Hant: 啟用 Java Gateway
      required: true
      type: select
      values:
        - label: "关闭"
          value: "false"
        - label: "开启"
          value: "true"
