services:
  pst:
    image: jokerwho/palworld-server-tool:0.12.2
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - ${PANEL_APP_PORT_HTTP}:8080
    volumes:
      - ${PALWORLD_SAVE_PATH}:/app/save
      - ./data/backups:/app/backups
      - ./data/pst.db:/app/pst.db
      - ./data/config.db:/app/config.db
    environment:
      - PST_PORT=8080
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true
